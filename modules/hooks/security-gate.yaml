---
name: security-gate
type: hook
description: 위험한 Bash 명령 실행을 사전 차단하는 PreToolUse hook
tags: [security, hook, preToolUse]
priority: 10
---

event: PreToolUse
matcher: Bash
hooks:
  - type: command
    command: >-
      bash -c '
      INPUT=$(cat);
      CMD=$(echo "$INPUT" | jq -r ".tool_input.command // empty");
      if echo "$CMD" | grep -qE "rm\s+-rf\s+/|rm\s+-rf\s+~|DROP\s+DATABASE|DROP\s+TABLE|truncate\s+|mkfs\.|dd\s+if=|:(){ :|:& };:"; then
        echo "BLOCKED: Dangerous command detected: $CMD" >&2;
        exit 1;
      fi;
      exit 0;
      '
    timeout: 5000
