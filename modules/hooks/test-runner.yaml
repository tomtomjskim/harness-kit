---
name: test-runner
type: hook
description: 코드 변경 후 관련 테스트를 자동 실행하는 PostToolUse hook
tags: [testing, hook, postToolUse]
priority: 60
variables:
  test_command:
    type: string
    required: false
    default: "npm test"
    description: 테스트 실행 명령어
---

event: PostToolUse
matcher: Write|Edit
hooks:
  - type: command
    command: >-
      bash -c '
      INPUT=$(cat);
      FILE=$(echo "$INPUT" | jq -r ".tool_input.file_path // empty");
      if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then exit 0; fi;
      EXT="${FILE##*.}";
      case "$EXT" in
        ts|tsx|js|jsx|py)
          echo "[harness-kit] Running tests after code change..." >&2;
          {{test_command}} --passWithNoTests 2>/dev/null || true;
          ;;
      esac;
      exit 0;
      '
    timeout: 30000
    async: true
