---
name: commit-guard
type: hook
description: git commit 전 lint 및 타입 체크를 실행하는 PreToolUse hook
tags: [quality, hook, preToolUse, git]
priority: 40
variables:
  lint_command:
    type: string
    required: false
    default: "npm run lint"
    description: 린트 실행 명령어
---

event: PreToolUse
matcher: Bash
hooks:
  - type: command
    command: >-
      bash -c '
      INPUT=$(cat);
      CMD=$(echo "$INPUT" | jq -r ".tool_input.command // empty");
      if echo "$CMD" | grep -qE "^git\s+commit"; then
        echo "[harness-kit] Running lint before commit..." >&2;
        {{lint_command}} 2>&1 || {
          echo "BLOCKED: Lint failed. Fix issues before committing." >&2;
          exit 1;
        };
      fi;
      exit 0;
      '
    timeout: 30000
